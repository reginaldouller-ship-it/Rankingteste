name: Atualizar Ranking Semanal

on:
  schedule:
    - cron: "0 13 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install requests beautifulsoup4 supabase

      - name: Rodar scraper
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python scraper.py

      - name: Atualizar discografias
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python sync_discography.py

      - name: Commit e push do ranking.json
        run: |
          git config user.name "Ranking Bot"
          git config user.email "bot@ranking-brasil.com"
          # Salvar arquivos gerados pelo scraper antes de sincronizar com o remote
          cp data/ranking.json /tmp/ranking.json
          cp data/ranking_history.json /tmp/ranking_history.json 2>/dev/null || true
          cp data/playlist_ids.json /tmp/playlist_ids.json 2>/dev/null || true
          # Sincronizar com o estado mais recente do remote (evita conflitos)
          git fetch origin main
          git reset --hard origin/main
          # Restaurar arquivos gerados
          cp /tmp/ranking.json data/ranking.json
          cp /tmp/ranking_history.json data/ranking_history.json 2>/dev/null || true
          cp /tmp/playlist_ids.json data/playlist_ids.json 2>/dev/null || true
          # Commitar e fazer push
          git add data/ranking.json data/ranking_history.json data/playlist_ids.json
          git diff --staged --quiet || git commit -m "🎵 Ranking atualizado — $(date '+%d/%m/%Y')"
          git push origin main

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github,scraper.py,requirements.txt,.gitignore"
