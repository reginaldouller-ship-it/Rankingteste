<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestão de Gêneros — RankingBR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }
    .logo { font-size: 1.1rem; }
    .back-link {
      font-size: 13px; color: var(--muted); text-decoration: none;
      display: flex; align-items: center; gap: 5px; transition: color 0.15s;
    }
    .back-link:hover { color: var(--text); }

    /* ── Layout ── */
    .layout {
      display: flex; flex: 1; overflow: hidden;
      height: calc(100vh - 57px);
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-title {
      padding: 1rem 1.25rem 0.5rem;
      font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
    }
    .genre-list { flex: 1; overflow-y: auto; padding: 0.25rem 0.75rem 0.75rem; }
    .genre-chip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 8px; border-radius: 8px; margin-bottom: 3px;
      transition: background 0.1s; gap: 6px;
    }
    .genre-chip:hover { background: var(--surface2); }
    .genre-chip:hover .genre-chip-btns { opacity: 1; }
    .genre-chip-name { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; truncate: ellipsis; overflow: hidden; white-space: nowrap; }
    .genre-chip-right {
      display: flex; align-items: center; gap: 4px; flex-shrink: 0;
    }
    .genre-chip-count {
      font-size: 11px; color: var(--muted);
      background: var(--surface2); padding: 2px 7px; border-radius: 10px;
    }
    .genre-chip-btns {
      display: flex; gap: 2px;
      opacity: 0; transition: opacity 0.1s;
    }
    .btn-icon {
      background: none; border: none; cursor: pointer;
      padding: 3px 5px; border-radius: 4px;
      font-size: 12px; line-height: 1;
      color: var(--muted); transition: background 0.1s, color 0.1s;
    }
    .btn-icon:hover { background: var(--surface3); color: var(--text); }
    .btn-icon.danger:hover { background: rgba(239,68,68,0.15); color: var(--danger); }
    /* Edit state in sidebar */
    .genre-chip.editing { background: var(--surface2); }
    .genre-chip.editing:hover { background: var(--surface2); }
    .genre-edit-input {
      flex: 1; background: var(--surface3);
      border: 1px solid var(--accent); border-radius: 6px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 12px; padding: 3px 7px; outline: none; min-width: 0;
    }
    .genre-chip.editing .genre-chip-btns { opacity: 1; }

    /* ── Main panel ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .error-banner {
      background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.35);
      border-radius: 8px; color: var(--danger); font-size: 13px;
      padding: 10px 14px; margin: 0.75rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
    }
    .error-banner.hidden { display: none; }
    .error-banner button { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 16px; }

    /* ── Toolbar (Criar Gênero — topo esquerdo) ── */
    .toolbar {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar-label {
      font-size: 12px; color: var(--muted); white-space: nowrap; font-weight: 500;
    }
    .toolbar-input {
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 6px 10px; outline: none; transition: border-color 0.15s;
      width: 200px;
    }
    .toolbar-input:focus { border-color: var(--accent); }
    .toolbar-input::placeholder { color: var(--muted); }
    .btn-create-genre {
      background: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600; padding: 6px 14px;
      cursor: pointer; transition: opacity 0.15s; white-space: nowrap;
    }
    .btn-create-genre:hover { opacity: 0.85; }
    .btn-create-genre:disabled { opacity: 0.4; cursor: default; }
    .toolbar-sep {
      width: 1px; height: 24px; background: var(--border2); flex-shrink: 0;
    }

    /* ── Filter bar ── */
    .filter-bar {
      padding: 0.75rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap; flex-shrink: 0;
    }
    .filter-toggle { display: flex; gap: 4px; }
    .ftoggle-btn {
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .ftoggle-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .ftoggle-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      width: 14px; height: 14px; fill: var(--muted); pointer-events: none;
    }
    .search-input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 7px 10px 7px 30px; outline: none; transition: border-color 0.15s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .artist-count { font-size: 12px; color: var(--muted); white-space: nowrap; }

    /* ── Table ── */
    .table-wrap { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      padding: 8px 1.25rem; font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 2;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    tbody tr:hover { background: var(--surface2); }
    tbody td { padding: 10px 1.25rem; font-size: 13px; vertical-align: middle; }
    .td-artist { font-weight: 500; }
    .td-count { color: var(--muted); font-size: 12px; }
    .td-genres { min-width: 180px; }
    .genre-tag {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 600; color: var(--accent);
      background: rgba(108,99,255,0.12); border: 1px solid rgba(108,99,255,0.3);
      padding: 2px 8px; border-radius: 4px; margin: 2px 3px 2px 0;
    }
    .no-genre { font-size: 11px; color: var(--muted); font-style: italic; }
    .td-actions { white-space: nowrap; }
    .btn-edit {
      padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-edit:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .edit-row td { background: var(--surface2); padding: 12px 1.25rem; }
    .edit-row-inner { display: flex; align-items: flex-start; gap: 12px; flex-wrap: wrap; }
    .edit-label { font-size: 12px; color: var(--muted); padding-top: 6px; white-space: nowrap; }
    .genre-checkboxes { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
    .genre-check-label {
      display: flex; align-items: center; gap: 5px; padding: 4px 10px;
      border-radius: 6px; border: 1px solid var(--border2);
      cursor: pointer; font-size: 12px; color: var(--muted);
      transition: all 0.15s; user-select: none;
    }
    .genre-check-label:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .genre-check-label.checked {
      background: rgba(108,99,255,0.15); border-color: rgba(108,99,255,0.5); color: var(--text);
    }
    /* Checkbox visível mas pequeno para acessibilidade */
    .genre-check-label input[type="checkbox"] {
      width: 13px; height: 13px; accent-color: var(--accent);
      cursor: pointer; flex-shrink: 0;
    }
    .edit-actions { display: flex; gap: 6px; margin-top: 2px; align-items: flex-start; }
    .btn-save {
      padding: 5px 14px; border-radius: 6px; border: none;
      background: var(--accent); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.85; }
    .btn-save:disabled { opacity: 0.5; cursor: default; }
    .btn-cancel {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border2);
      background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-cancel:hover { color: var(--text); }
    .btn-remove {
      padding: 5px 12px; border-radius: 6px; border: 1px solid rgba(239,68,68,0.3);
      background: transparent; color: var(--danger);
      font-family: 'DM Sans', sans-serif; font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-remove:hover { background: rgba(239,68,68,0.1); }
    .state-msg { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 13px; }

    /* ── Artist name clickable ── */
    .td-artist-link {
      font-weight: 500; color: var(--text); cursor: pointer;
      transition: color 0.15s; text-decoration: none;
    }
    .td-artist-link:hover { color: var(--accent); }

    /* ── Artist Detail Panel (overlay) ── */
    .artist-detail-overlay {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.6); display: none;
      justify-content: center; align-items: flex-start;
      padding: 2rem;
    }
    .artist-detail-overlay.open { display: flex; }
    .artist-detail-panel {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 14px; width: 100%; max-width: 900px;
      max-height: calc(100vh - 4rem); display: flex; flex-direction: column;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }
    .artist-detail-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      gap: 12px; flex-shrink: 0;
    }
    .artist-detail-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px; font-weight: 700; min-width: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .artist-detail-meta {
      display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .artist-detail-count {
      font-size: 12px; color: var(--muted); white-space: nowrap;
    }
    .artist-detail-synced {
      font-size: 11px; color: var(--muted); white-space: nowrap; opacity: 0.7;
    }
    .btn-toggle-dupes {
      display: inline-flex; align-items: center; gap: 4px;
      background: transparent; color: var(--muted);
      border: 1px solid var(--border2);
      padding: 4px 10px; border-radius: 6px;
      font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-toggle-dupes:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .btn-toggle-dupes.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-sync-artist {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(29,185,84,0.12); color: var(--sp);
      border: 1px solid rgba(29,185,84,0.3);
      padding: 5px 12px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.15s; white-space: nowrap;
    }
    .btn-sync-artist:hover { background: rgba(29,185,84,0.22); }
    .btn-sync-artist:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sync-artist.syncing svg { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .btn-close-detail {
      background: none; border: none; color: var(--muted); font-size: 20px;
      cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: all 0.15s;
    }
    .btn-close-detail:hover { background: var(--surface2); color: var(--text); }
    .artist-detail-body { flex: 1; overflow-y: auto; padding: 0; }
    .artist-tracks-table { width: 100%; border-collapse: collapse; }
    .artist-tracks-table thead th {
      padding: 8px 1rem; font-size: 11px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; text-align: left;
      border-bottom: 1px solid var(--border); background: var(--surface);
      position: sticky; top: 0; z-index: 2;
    }
    .artist-tracks-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
    .artist-tracks-table tbody tr:hover { background: var(--surface2); }
    .artist-tracks-table td { padding: 8px 1rem; font-size: 13px; }
    .artist-tracks-table .col-rank { width: 40px; text-align: center; color: var(--muted); font-weight: 600; }
    .artist-tracks-table .col-pop {
      width: 50px; text-align: center;
    }
    .pop-bar {
      display: inline-block; height: 6px; border-radius: 3px;
      background: var(--accent); min-width: 2px;
    }
    .pop-num { font-size: 11px; color: var(--muted); margin-left: 4px; }
    .artist-tracks-table .col-date { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .track-name-link {
      color: var(--fg); text-decoration: none; transition: color 0.15s;
    }
    .track-name-link:hover { color: var(--sp); }
    .copy-cell {
      display: inline-flex; align-items: center; gap: 4px;
    }
    .btn-copy-link {
      background: none; border: none; cursor: pointer; padding: 4px 6px;
      color: var(--muted); font-size: 16px; transition: color 0.15s;
      border-radius: 4px;
    }
    .btn-copy-link:hover { color: var(--sp); }
    .rank-gold { color: var(--gold); }
    .rank-silver { color: var(--silver); }
    .rank-bronze { color: var(--bronze); }
    .track-name-cell { display: flex; align-items: center; gap: 6px; }
    .feat-badge {
      flex-shrink: 0;
      font-size: 9px; font-weight: 700; letter-spacing: 0.5px;
      padding: 2px 5px; border-radius: 3px;
      background: var(--sp); color: #000;
      opacity: 0.85;
    }
    .track-artists { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .row-featured td { opacity: 0.8; }

    @media (max-width: 680px) {
      .layout { height: auto; flex-direction: column; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); }
      .genre-list { max-height: 180px; }
      .genre-chip-btns { opacity: 1; }
      .toolbar { flex-wrap: wrap; }
      .toolbar-input { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Ranking<span>BR</span> — Gêneros</div>
  <a class="back-link" href="index.html">
    <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Voltar ao ranking
  </a>
</header>

<div class="layout">
  <!-- ── Sidebar: lista de gêneros com editar/excluir ── -->
  <div class="sidebar">
    <div class="sidebar-title">Gêneros</div>
    <div class="genre-list" id="genre-list">
      <div class="state-msg">Carregando...</div>
    </div>
  </div>

  <!-- ── Painel principal ── -->
  <div class="main">
    <div id="error-banner" class="error-banner hidden">
      <span id="error-msg"></span>
      <button onclick="dismissError()">✕</button>
    </div>

    <!-- Toolbar: Criar Gênero + Adicionar Artista -->
    <div class="toolbar">
      <span class="toolbar-label">Criar gênero:</span>
      <input type="text" class="toolbar-input" id="new-genre-input" placeholder="Nome do gênero..." maxlength="40" autocomplete="off" />
      <button class="btn-create-genre" id="btn-add-genre" disabled>+ Criar</button>
      <span class="toolbar-sep"></span>
      <span class="toolbar-label">Adicionar artista:</span>
      <input type="text" class="toolbar-input" id="new-artist-input" placeholder="Nome do artista..." maxlength="100" autocomplete="off" />
      <button class="btn-create-genre" id="btn-add-artist" disabled>+ Adicionar</button>
    </div>

    <div class="filter-bar">
      <div class="filter-toggle">
        <button class="ftoggle-btn active" data-view="all">Todos</button>
        <button class="ftoggle-btn" data-view="unclassified">Sem gênero</button>
      </div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        <input type="text" class="search-input" id="search-input" placeholder="Buscar artista..." autocomplete="off" />
      </div>
      <span class="artist-count" id="artist-count"></span>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Artista</th><th>Músicas</th><th>Gêneros</th><th>Ação</th></tr>
        </thead>
        <tbody id="artist-tbody">
          <tr><td colspan="4" class="state-msg">Carregando artistas...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ── Artist Detail Overlay ── -->
<div class="artist-detail-overlay" id="artist-detail-overlay">
  <div class="artist-detail-panel">
    <div class="artist-detail-header">
      <div class="artist-detail-title" id="artist-detail-title"></div>
      <div class="artist-detail-meta">
        <span class="artist-detail-synced" id="artist-detail-synced"></span>
        <span class="artist-detail-count" id="artist-detail-count"></span>
        <button class="btn-toggle-dupes" id="btn-toggle-dupes" title="Ocultar/mostrar duplicadas">Ocultar duplicadas</button>
        <button class="btn-sync-artist" id="btn-sync-artist">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
          <span id="sync-artist-label">Sincronizar</span>
        </button>
        <button class="btn-close-detail" id="btn-close-detail">✕</button>
      </div>
    </div>
    <div class="artist-detail-body" id="artist-detail-body">
      <div class="state-msg">Carregando discografia...</div>
    </div>
  </div>
</div>

<script type="module" src="genres-app.js"></script>
</body>
</html>
