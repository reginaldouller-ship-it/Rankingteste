<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking Brasil Semanal — Spotify + YouTube</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 1rem;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .logo { font-size: 1.25rem; }
    /* ── WEEK PICKER (estilo Spotify) ── */
    .week-picker-wrap { position: relative; }
    .week-picker-btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: border-color 0.15s;
      white-space: nowrap;
    }
    .week-picker-btn:hover { border-color: rgba(255,255,255,0.2); }
    .week-picker-btn.open { border-color: var(--accent); }
    .week-picker-btn svg { width: 12px; height: 12px; fill: var(--muted); transition: transform 0.2s; }
    .week-picker-btn.open svg { transform: rotate(180deg); }

    .week-calendar {
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
      padding: 16px;
      z-index: 200;
      display: none;
      min-width: 520px;
    }
    .week-calendar.open { display: block; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .cal-nav {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 18px; padding: 4px 8px;
      border-radius: 6px; transition: all 0.15s;
    }
    .cal-nav:hover { background: var(--surface2); color: var(--text); }
    .cal-months {
      display: grid;
      grid-template-columns: auto auto;
      gap: 24px;
      justify-content: center;
    }
    .cal-month-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 8px;
      color: var(--text);
    }
    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 32px);
      grid-auto-rows: 32px;
      row-gap: 2px;
      column-gap: 0;
      text-align: center;
      justify-content: center;
    }
    .cal-dow {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 32px;
    }
    .cal-day {
      font-size: 12px;
      line-height: 32px;
      border-radius: 6px;
      color: var(--muted);
      cursor: default;
      transition: background 0.1s, color 0.1s;
      overflow: hidden;
      margin: 0;
      padding: 0;
    }
    .cal-day.empty { visibility: hidden; }
    .cal-day.has-data {
      color: var(--text);
      cursor: pointer;
      font-weight: 500;
    }
    .cal-day.has-data:hover {
      background: var(--surface2);
    }
    .cal-day.in-week {
      background: rgba(108,99,255,0.15);
      color: var(--text);
      border-radius: 0;
    }
    .cal-day.week-start { border-radius: 6px 0 0 6px; }
    .cal-day.week-end { border-radius: 0 6px 6px 0; }
    .cal-day.selected {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      border-radius: 6px;
    }
    .cal-day.future {
      opacity: 0.25;
    }

    @media (max-width: 600px) {
      .week-calendar {
        min-width: auto;
        width: calc(100vw - 2rem);
        left: auto;
        right: -1rem;
        transform: none;
      }
      .cal-months {
        grid-template-columns: 1fr;
      }
    }
    /* ── SYNC PLAYLISTS BUTTON ── */
    .btn-sync-playlists {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(29,185,84,0.12);
      color: var(--sp);
      border: 1px solid rgba(29,185,84,0.3);
      padding: 6px 14px;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: .85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-sync-playlists:hover { background: rgba(29,185,84,0.22); border-color: rgba(29,185,84,0.5); }
    .btn-sync-playlists:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sync-playlists.syncing svg { animation: spin 1s linear infinite; }
    .btn-sync-playlists.success { background: rgba(29,185,84,0.25); border-color: var(--sp); }
    .btn-sync-playlists.error { background: rgba(239,68,68,0.12); border-color: rgba(239,68,68,0.3); color: #ef4444; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .platform-pills { display: flex; gap: 8px; }
    .pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }

    /* ── FILTERS ── */
    .filters {
      max-width: 860px;
      margin: 1.25rem auto 0;
      padding: 0 1rem;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .genre-filters {
      max-width: 860px;
      margin: 0.5rem auto 0;
      padding: 0 1rem;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .genre-btn {
      padding: 4px 11px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .genre-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
    .genre-btn.active {
      background: var(--surface2);
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
    }
    .genre-btn.active-selected {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .genre-btn.dim { opacity: 0.35; pointer-events: none; }

    /* ── MAIN ── */
    main {
      max-width: 860px;
      margin: 1.5rem auto 4rem;
      padding: 0 1rem;
    }

    /* ── TRACK ROW ── */
    .track-list { display: flex; flex-direction: column; gap: 4px; }
    .track {
      display: grid;
      grid-template-columns: 36px 52px 1fr auto;
      align-items: center;
      gap: 14px;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      cursor: default;
    }
    .track:hover {
      background: var(--surface2);
      border-color: var(--border);
    }

    .rank-num {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      color: var(--muted);
      min-width: 36px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .rank-filter-pos { font-size: 16px; font-weight: 700; line-height: 1; }
    .rank-global-pos { font-size: 10px; font-weight: 500; color: var(--muted); line-height: 1; opacity: 0.75; }
    .rank-1 .rank-filter-pos { color: var(--gold); }
    .rank-2 .rank-filter-pos { color: var(--silver); }
    .rank-3 .rank-filter-pos { color: var(--bronze); }
    .rank-num.no-filter { font-size: 16px; }
    .rank-num.no-filter.rank-1 { color: var(--gold); }
    .rank-num.no-filter.rank-2 { color: var(--silver); }
    .rank-num.no-filter.rank-3 { color: var(--bronze); }

    /* ── GENRE OVERRIDE BUTTON ── */
    .genre-override-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      line-height: 1;
      padding: 0;
      font-family: 'DM Sans', sans-serif;
    }
    .genre-override-btn:hover {
      background: var(--surface2);
      border-color: rgba(255,255,255,0.2);
      color: var(--text);
    }
    .genre-override-btn.has-override {
      border-color: rgba(108,99,255,0.4);
      color: var(--accent);
    }

    /* ── GENRE DROPDOWN ── */
    .genre-dropdown {
      position: fixed;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 10px;
      padding: 6px;
      min-width: 180px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 999;
      display: none;
    }
    .genre-dropdown.open { display: block; }
    .genre-dropdown-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 4px 8px 6px;
    }
    .genre-dropdown-item {
      display: block;
      width: 100%;
      text-align: left;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: none;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s;
    }
    .genre-dropdown-item:hover { background: var(--surface2); }
    .genre-dropdown-item.current { color: var(--accent); font-weight: 600; }
    .genre-dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }
    .genre-dropdown-remove { color: #ef4444; }
    .genre-dropdown-remove:hover { background: rgba(239,68,68,0.1); }

    .track-thumb {
      width: 52px; height: 52px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    .track-thumb img {
      width: 52px; height: 52px;
      border-radius: 8px;
      object-fit: cover;
      border: none;
      display: block;
    }

    .track-info { min-width: 0; }
    .track-title {
      font-size: 14px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--text);
    }
    .track-artist {
      font-size: 12px; color: var(--muted);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .track-tags { display: flex; align-items: center; gap: 6px; margin-top: 5px; flex-wrap: wrap; }

    .tag-both {
      font-size: 10px; font-weight: 600;
      color: var(--accent);
      background: rgba(108,99,255,0.12);
      border: 1px solid rgba(108,99,255,0.3);
      padding: 2px 7px; border-radius: 4px;
    }
    .sp-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; font-weight: 500;
      color: var(--sp);
      background: rgba(29,185,84,0.08);
      border: 1px solid rgba(29,185,84,0.25);
      padding: 2px 8px; border-radius: 4px;
      text-decoration: none; transition: background 0.15s;
    }
    .sp-link:hover { background: rgba(29,185,84,0.18); }
    .sp-link svg { width: 10px; height: 10px; fill: var(--sp); }
    .copy-btn {
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 500;
      color: var(--sp);
      background: rgba(29,185,84,0.08);
      border: 1px solid rgba(29,185,84,0.25);
      padding: 2px 7px; border-radius: 4px;
      cursor: pointer; transition: background 0.15s;
      font-family: 'DM Sans', sans-serif; line-height: 1.4;
    }
    .copy-btn:hover { background: rgba(29,185,84,0.18); }
    .copy-btn svg { width: 10px; height: 10px; fill: var(--sp); }

    /* ── META RIGHT ── */
    .track-meta {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 5px;
      flex-shrink: 0; min-width: 110px;
    }
    .total-streams {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px; font-weight: 600; color: var(--text);
    }
    .platform-detail { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .plat-row { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .plat-dot { width: 6px; height: 6px; border-radius: 50%; }
    .trend-up   { color: #22c55e; font-size: 11px; }
    .trend-down { color: #ef4444; font-size: 11px; }
    .trend-new  { color: var(--gold); font-size: 10px; font-weight: 600; }

    .empty { text-align: center; padding: 3rem 1rem; color: var(--muted); font-size: 14px; }

    footer {
      text-align: center; padding: 2rem 1rem;
      color: var(--muted); font-size: 12px;
      border-top: 1px solid var(--border); margin-top: 2rem;
    }
    footer a { color: var(--muted); }
    @media (max-width: 520px) {
      .track { grid-template-columns: 28px 40px 1fr auto; gap: 8px; }
      .track-thumb { width: 40px; height: 40px; }
      .track-thumb img { width: 40px; height: 40px; }
      .platform-detail { display: none; }
      .total-streams { font-size: 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div><div class="logo">Ranking<span>BR</span></div></div>
    <div class="week-picker-wrap">
      <button class="week-picker-btn" id="week-picker-btn" disabled>
        <span id="week-picker-label">carregando...</span>
        <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
      </button>
      <div class="week-calendar" id="week-calendar">
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">←</button>
          <div></div>
          <button class="cal-nav" id="cal-next">→</button>
        </div>
        <div class="cal-months" id="cal-months"></div>
      </div>
    </div>
    <div class="platform-pills">
      <div class="pill"><span class="dot" style="background:var(--sp)"></span>Spotify</div>
      <div class="pill"><span class="dot" style="background:var(--yt)"></span>YouTube</div>
    </div>
    <a href="genres.html" class="btn-manage-genres">Gerenciar Gêneros</a>
    <button class="btn-sync-playlists" id="btn-sync-playlists" title="Sincronizar playlists Spotify com os gêneros atuais">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
      <span id="sync-label">Sync Playlists</span>
    </button>
  </div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="both">Nas duas plataformas</button>
  <button class="filter-btn" data-filter="spotify">Só Spotify</button>
  <button class="filter-btn" data-filter="youtube">Só YouTube</button>
</div>

<div class="genre-filters" id="genre-filters"></div>

<main>
  <div class="track-list" id="track-list">
    <div class="empty">Carregando ranking...</div>
  </div>
</main>

<footer>
  Dados: <a href="https://kworb.net/spotify/country/br_weekly.html" target="_blank" rel="noopener">kworb Spotify BR</a> +
  <a href="https://kworb.net/youtube/insights/br.html" target="_blank" rel="noopener">kworb YouTube BR</a> •
  Atualizado toda sexta-feira
</footer>

<script type="module">
import { SUPABASE_URL, SB_HEADERS, sbRpc, esc } from './config.js';

const EMOJIS = ["🔥","🎵","⭐","👑","💥","🎤","🎶","🥁","🎸","🎧",
                "🌟","💫","🏆","🎼","🎹","🎺","🎻","🪗","🪘","🥳"];

let allTracks      = [];
let allGenres      = [];        // [{id, name}] — fonte oficial
let artistGenresMap = {};       // { "nome artista lowercase": ["genero1", "genero2"] }
let currentFilter  = "all";
let currentGenres  = new Set(); // multi-seleção; vazio = todos
let trackOverrides = {};        // { spotify_id: genre_name }
const thumbnailCache = new Map();

function emoji(i) { return EMOJIS[i % EMOJIS.length]; }

function fmt(n) {
  if (!n) return "—";
  if (n >= 1e9) return (n / 1e9).toFixed(1) + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(0) + "K";
  return n.toString();
}

async function retryThumbnail(img) {
  img.onerror = null;
  const spotifyUrl = img.dataset.spotify;
  if (!spotifyUrl) return;
  if (thumbnailCache.has(spotifyUrl)) {
    img.src = thumbnailCache.get(spotifyUrl);
    return;
  }
  try {
    const res = await fetch(
      `https://open.spotify.com/oembed?url=${encodeURIComponent(spotifyUrl)}`
    );
    if (res.ok) {
      const data = await res.json();
      if (data.thumbnail_url) {
        thumbnailCache.set(spotifyUrl, data.thumbnail_url);
        img.src = data.thumbnail_url;
        const track = allTracks.find(t => t.spotify_url === spotifyUrl);
        if (track) track.thumbnail_url = data.thumbnail_url;
      }
    }
  } catch (e) { console.warn("Fallback thumbnail falhou:", e); }
}
// Expor para onerror inline
window.retryThumbnail = retryThumbnail;

function loadMissingThumbnails() {
  document.querySelectorAll('.track-thumb img[data-spotify]').forEach(img => {
    if (img.getAttribute('src') === '') retryThumbnail(img);
  });
}

function copyLink(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = "Copiado!";
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}
window.copyLink = copyLink;

function filterByPlatform(tracks) {
  if (currentFilter === "both")    return tracks.filter(t => t.in_both);
  if (currentFilter === "spotify") return tracks.filter(t => t.pos_spotify && !t.in_both);
  if (currentFilter === "youtube") return tracks.filter(t => t.pos_youtube && !t.in_both);
  return tracks;
}

function getEffectiveGenre(t) {
  if (t.spotify_id && trackOverrides[t.spotify_id] !== undefined)
    return trackOverrides[t.spotify_id] || "outros";
  return t.genre || "outros";
}

function applyGenreFilter(tracks) {
  if (currentGenres.size === 0) return tracks;
  return tracks.filter(t => {
    if (t.spotify_id && trackOverrides[t.spotify_id] !== undefined) {
      return currentGenres.has(trackOverrides[t.spotify_id] || "outros");
    }
    const genres = t._genres || [t.genre || "outros"];
    return genres.some(g => currentGenres.has(g));
  });
}

function buildGenreFilters() {
  const container = document.getElementById("genre-filters");
  const genreCounts = {};
  for (const t of allTracks) {
    for (const g of (t._genres || [t.genre || "outros"])) {
      genreCounts[g] = (genreCounts[g] || 0) + 1;
    }
  }
  container.innerHTML = "";

  const platformFiltered = filterByPlatform(allTracks);
  const platformGenres = new Set(
    platformFiltered.flatMap(t => t._genres || [t.genre || "outros"])
  );
  const presentGenres    = new Set(platformFiltered.map(t => getEffectiveGenre(t)));
  const knownNames       = allGenres.map(g => g.name);
  const extraGenres      = [...presentGenres].filter(g => !knownNames.includes(g));
  const genreNames       = [...knownNames, ...extraGenres];

  const allBtn = document.createElement("button");
  allBtn.className   = "genre-btn" + (currentGenres.size === 0 ? " active" : "");
  allBtn.textContent = "Todos";
  allBtn.dataset.genre = "__all__";
  container.appendChild(allBtn);

  for (const name of genreNames) {
    const btn = document.createElement("button");
    const isSelected = currentGenres.has(name);
    const hasTracks  = presentGenres.has(name);
    let cls = "genre-btn";
    if (isSelected)      cls += " active-selected";
    else if (!hasTracks) cls += " dim";
    btn.className    = cls;
    btn.textContent  = name;
    btn.dataset.genre = name;
    container.appendChild(btn);
  }
}

function render() {
  const list = document.getElementById("track-list");
  let tracks = filterByPlatform(allTracks);

  tracks = applyGenreFilter(tracks);
  const hasGenreFilter = currentGenres.size > 0;

  if (!tracks.length) {
    list.innerHTML = `<div class="empty">Nenhuma música neste filtro.</div>`;
    return;
  }

  const copyIconSvg = `<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>`;

  list.innerHTML = tracks.map((t, i) => {
    const filterPos = i + 1;
    const globalPos = t.rank;

    const thumbContent = `<img src="${esc(t.thumbnail_url || '')}" width="52" height="52" alt="" data-spotify="${esc(t.spotify_url || '')}" onerror="retryThumbnail(this)">`;
    let rankHtml;
    if (hasGenreFilter) {
      const fpCls = filterPos === 1 ? "rank-1" : filterPos === 2 ? "rank-2" : filterPos === 3 ? "rank-3" : "";
      rankHtml = `<div class="rank-num ${fpCls}">
        <span class="rank-filter-pos">${filterPos}</span>
        <span class="rank-global-pos">#${globalPos}</span>
      </div>`;
    } else {
      const gpCls = "no-filter" + (globalPos === 1 ? " rank-1" : globalPos === 2 ? " rank-2" : globalPos === 3 ? " rank-3" : "");
      rankHtml = `<div class="rank-num ${gpCls}">${globalPos}</div>`;
    }

    const safeSpotifyUrl = esc(t.spotify_url || '');
    const spButtons = t.spotify_url
      ? `<a class="sp-link" href="${safeSpotifyUrl}" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></svg>
          Ouvir
        </a>
        <button class="copy-btn" onclick="copyLink('${safeSpotifyUrl}', this)" title="Copiar link">${copyIconSvg}</button>`
      : "";

    const bothTag    = t.in_both ? `<span class="tag-both">✦ nas duas</span>` : "";
    const trendBadge = (() => {
      if (!t.trend || t.trend === "same") return "";
      if (t.trend === "new")    return `<span class="trend-new">NOVO</span>`;
      if (t.trend === "return") return `<span class="trend-new">RETORNO</span>`;
      if (t.trend.startsWith("up:"))   return `<span class="trend-up">▲${t.trend.split(":")[1]}</span>`;
      if (t.trend.startsWith("down:")) return `<span class="trend-down">▼${t.trend.split(":")[1]}</span>`;
      return "";
    })();

    const spRow = t.streams_spotify
      ? `<div class="plat-row"><span class="plat-dot" style="background:var(--sp)"></span>#${t.pos_spotify ?? "—"} · ${fmt(t.streams_spotify)}</div>` : "";
    const ytRow = t.streams_youtube
      ? `<div class="plat-row"><span class="plat-dot" style="background:var(--yt)"></span>#${t.pos_youtube ?? "—"} · ${fmt(t.streams_youtube)}</div>` : "";

    const effectiveGenre = getEffectiveGenre(t);
    const hasOverride    = t.spotify_id && trackOverrides[t.spotify_id] != null;
    const overrideBtn    = t.spotify_id
      ? `<button class="genre-override-btn${hasOverride ? " has-override" : ""}"
           data-spotify-id="${esc(t.spotify_id)}"
           data-current-genre="${esc(effectiveGenre)}"
           title="${hasOverride ? "Gênero manual: " + esc(effectiveGenre) : "Definir gênero manualmente"}"
           onclick="openGenreDropdown(this, event)">⋯</button>`
      : "";

    return `
    <div class="track">
      ${rankHtml}
      <div class="track-thumb">${thumbContent}</div>
      <div class="track-info">
        <div class="track-title">${esc(t.title)}</div>
        <div class="track-artist">${esc((t.artists && t.artists.length > 1) ? t.artists.join(", ") : (t.artist || ""))}</div>
        <div class="track-tags">${trendBadge}${bothTag}${spButtons}</div>
      </div>
      <div class="track-meta">
        <div class="total-streams" style="display:flex;align-items:center;gap:6px">
          <span>${fmt(t.total_streams)}</span>${overrideBtn}
        </div>
        <div class="platform-detail">${spRow}${ytRow}</div>
      </div>
    </div>`;
  }).join("");
}

function enrichTrackGenres(tracks) {
  for (const t of tracks) {
    const artistCount = t.artists ? t.artists.length : 1;
    if (artistCount === 1) {
      const name = (t.artist || "").toLowerCase();
      const mapped = artistGenresMap[name];
      if (mapped && mapped.length > 0) {
        t._genres = mapped;
        continue;
      }
    }
    t._genres = [t.genre || "outros"];
  }
}

async function loadArtistGenres() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/artists_with_genres?select=name,genres`,
      { headers: SB_HEADERS }
    );
    if (res.ok) {
      const rows = await res.json();
      if (rows && rows.length > 0) {
        for (const row of rows) {
          if (row.name && Array.isArray(row.genres) && row.genres.length > 0) {
            artistGenresMap[row.name.toLowerCase()] = row.genres;
          }
        }
        return;
      }
    }
  } catch (e) { console.warn("Fallback: erro ao carregar gêneros do Supabase:", e); }

  try {
    const res = await fetch("data/genres.json");
    if (!res.ok) return;
    const data = await res.json();
    for (const [name, genres] of Object.entries(data.artist_genres || {})) {
      artistGenresMap[name.toLowerCase()] = Array.isArray(genres) ? genres : [genres];
    }
  } catch (e) { console.warn("Fallback: erro ao carregar genres.json:", e); }
}

// ── Genre Override UI ───────────────────────────────────────────────────────
let activeDropdown = null;

function openGenreDropdown(btn, event) {
  event.stopPropagation();
  if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; }

  const spotifyId    = btn.dataset.spotifyId;
  const currentGenre = btn.dataset.currentGenre;
  const dropdown     = document.createElement("div");
  dropdown.className = "genre-dropdown open";

  const title = document.createElement("div");
  title.className   = "genre-dropdown-title";
  title.textContent = "Gênero da música";
  dropdown.appendChild(title);

  for (const g of allGenres) {
    const item = document.createElement("button");
    item.className   = "genre-dropdown-item" + (g.name === currentGenre ? " current" : "");
    item.textContent = (g.name === currentGenre ? "✓ " : "") + g.name;
    item.addEventListener("click", async () => {
      dropdown.remove(); activeDropdown = null;
      await setTrackGenre(spotifyId, g.name, btn);
    });
    dropdown.appendChild(item);
  }

  if (trackOverrides[spotifyId] != null) {
    const div = document.createElement("div");
    div.className = "genre-dropdown-divider";
    dropdown.appendChild(div);
    const removeItem = document.createElement("button");
    removeItem.className   = "genre-dropdown-item genre-dropdown-remove";
    removeItem.textContent = "✕ Remover gênero manual";
    removeItem.addEventListener("click", async () => {
      dropdown.remove(); activeDropdown = null;
      await removeTrackGenre(spotifyId, btn);
    });
    dropdown.appendChild(removeItem);
  }

  document.body.appendChild(dropdown);
  activeDropdown = dropdown;
  const rect = btn.getBoundingClientRect();
  let left = rect.right - 200;
  let top  = rect.bottom + 4;
  if (left < 8) left = 8;
  if (top + 300 > window.innerHeight) top = rect.top - 4 - dropdown.offsetHeight;
  dropdown.style.left = left + "px";
  dropdown.style.top  = top  + "px";
}
window.openGenreDropdown = openGenreDropdown;

document.addEventListener("click", () => {
  if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; }
});

async function setTrackGenre(spotifyId, genreName, btn) {
  btn.disabled = true;
  try {
    await sbRpc("set_track_override", { p_spotify_id: spotifyId, p_genre_name: genreName });
    trackOverrides[spotifyId] = genreName;
    btn.dataset.currentGenre  = genreName;
    btn.classList.add("has-override");
    btn.title = "Gênero manual: " + genreName;
    buildGenreFilters();
    render();
  } catch (e) {
    alert("Erro ao salvar gênero: " + e.message);
  } finally { btn.disabled = false; }
}

async function removeTrackGenre(spotifyId, btn) {
  btn.disabled = true;
  try {
    await sbRpc("remove_track_override", { p_spotify_id: spotifyId });
    delete trackOverrides[spotifyId];
    btn.classList.remove("has-override");
    btn.title = "Definir gênero manualmente";
    buildGenreFilters();
    render();
  } catch (e) {
    alert("Erro ao remover gênero: " + e.message);
  } finally { btn.disabled = false; }
}

// ── Carregamento ────────────────────────────────────────────────────────────
async function loadGenres() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/genres?select=id,name&order=name`, { headers: SB_HEADERS });
    if (r.ok) allGenres = await r.json();
  } catch (e) { console.warn("Erro ao carregar gêneros:", e); }
}

async function loadTrackOverrides() {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/track_overrides_with_genres?select=spotify_id,genre_name`, { headers: SB_HEADERS });
    if (r.ok) {
      const rows = await r.json();
      for (const row of rows) trackOverrides[row.spotify_id] = row.genre_name;
    }
  } catch (e) { console.warn("Erro ao carregar overrides:", e); }
}

// ── Semanas + Calendário estilo Spotify ─────────────────────────────────────
let allWeeks = [];       // [{id, week_label, week_end_date, generated_at}]
let selectedWeekId = null;
let calViewDate = new Date();  // mês exibido no calendário

const MONTHS_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                   "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
const DAYS_PT = ["Do","Se","Te","Qu","Qu","Se","Sá"];

async function loadWeeks() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/ranking_weeks?select=id,week_label,week_end_date,generated_at&order=generated_at.desc`,
      { headers: SB_HEADERS }
    );
    if (res.ok) {
      allWeeks = await res.json();
      if (allWeeks.length > 0) {
        selectedWeekId = allWeeks[0].id;
        updatePickerLabel();
        // Posicionar calendário no mês da semana mais recente
        const d = allWeeks[0].week_end_date
          ? new Date(allWeeks[0].week_end_date + "T00:00:00")
          : new Date();
        calViewDate = new Date(d.getFullYear(), d.getMonth() - 1, 1);
        document.getElementById("week-picker-btn").disabled = false;
      }
    }
  } catch (e) { console.warn("Erro ao carregar semanas:", e); }
}

function updatePickerLabel() {
  const w = allWeeks.find(w => w.id === selectedWeekId);
  const label = document.getElementById("week-picker-label");
  if (w) {
    if (w.week_end_date) {
      const d = new Date(w.week_end_date + "T00:00:00");
      label.textContent = `Semana de ${d.getDate()} de ${MONTHS_PT[d.getMonth()].substring(0,3)}`;
    } else {
      label.textContent = w.week_label;
    }
  }
}

function getWeekDates(weekEndStr) {
  if (!weekEndStr) return [];
  const end = new Date(weekEndStr + "T00:00:00");
  const dates = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(end);
    d.setDate(end.getDate() - i);
    dates.push(d.toISOString().slice(0, 10));
  }
  return dates;
}

function renderCalendar() {
  const container = document.getElementById("cal-months");
  const weekDatesMap = {};  // "YYYY-MM-DD" -> weekId
  const weekEndDates = new Set();

  for (const w of allWeeks) {
    if (!w.week_end_date) continue;
    weekEndDates.add(w.week_end_date);
    for (const d of getWeekDates(w.week_end_date)) {
      weekDatesMap[d] = w.id;
    }
  }

  // Semana selecionada
  const selWeek = allWeeks.find(w => w.id === selectedWeekId);
  const selDates = selWeek?.week_end_date ? new Set(getWeekDates(selWeek.week_end_date)) : new Set();
  const selEnd = selWeek?.week_end_date || "";
  const selStart = selDates.size ? [...selDates].sort()[0] : "";

  const today = new Date();
  let html = "";

  for (let m = 0; m < 2; m++) {
    const viewMonth = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + m, 1);
    const year = viewMonth.getFullYear();
    const month = viewMonth.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDow = viewMonth.getDay();  // 0=Sun

    html += `<div>
      <div class="cal-month-title">${MONTHS_PT[month]} ${year}</div>
      <div class="cal-grid">`;

    for (const d of DAYS_PT) html += `<div class="cal-dow">${d}</div>`;
    for (let i = 0; i < firstDow; i++) html += `<div class="cal-day empty"></div>`;

    for (let day = 1; day <= daysInMonth; day++) {
      const dateStr = `${year}-${String(month + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
      const isFuture = new Date(dateStr + "T00:00:00") > today;
      const wId = weekDatesMap[dateStr];
      const isInSel = selDates.has(dateStr);
      const isSelected = dateStr === selEnd;
      const isWeekStart = dateStr === selStart;
      const isWeekEnd = dateStr === selEnd && isInSel;

      let cls = "cal-day";
      if (isFuture) cls += " future";
      if (wId) cls += " has-data";
      if (isInSel && !isSelected) cls += " in-week";
      if (isSelected) cls += " selected";
      if (isWeekStart) cls += " week-start";
      if (isWeekEnd && !isSelected) cls += " week-end";

      html += `<div class="${cls}" data-date="${dateStr}" ${wId ? `data-week-id="${wId}"` : ""}>${day}</div>`;
    }

    html += `</div></div>`;
  }

  container.innerHTML = html;
}

function toggleCalendar() {
  const cal = document.getElementById("week-calendar");
  const btn = document.getElementById("week-picker-btn");
  const isOpen = cal.classList.toggle("open");
  btn.classList.toggle("open", isOpen);
  if (isOpen) renderCalendar();
}

// ── Calendar event listeners
document.getElementById("week-picker-btn").addEventListener("click", e => {
  e.stopPropagation();
  toggleCalendar();
});

document.getElementById("cal-prev").addEventListener("click", e => {
  e.stopPropagation();
  calViewDate.setMonth(calViewDate.getMonth() - 1);
  renderCalendar();
});

document.getElementById("cal-next").addEventListener("click", e => {
  e.stopPropagation();
  calViewDate.setMonth(calViewDate.getMonth() + 1);
  renderCalendar();
});

document.getElementById("cal-months").addEventListener("click", e => {
  const day = e.target.closest(".cal-day.has-data");
  if (!day) return;
  const weekId = parseInt(day.dataset.weekId, 10);
  if (weekId && weekId !== selectedWeekId) {
    selectedWeekId = weekId;
    updatePickerLabel();
    renderCalendar();
    loadRankingByWeek(weekId);
  }
  toggleCalendar();
});

document.addEventListener("click", e => {
  const cal = document.getElementById("week-calendar");
  const btn = document.getElementById("week-picker-btn");
  if (cal.classList.contains("open") && !cal.contains(e.target) && !btn.contains(e.target)) {
    cal.classList.remove("open");
    btn.classList.remove("open");
  }
});

async function loadRankingByWeek(weekId) {
  const list = document.getElementById("track-list");
  list.innerHTML = '<div class="empty">Carregando ranking...</div>';

  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/ranking_tracks?week_id=eq.${weekId}&select=*&order=rank`,
      { headers: SB_HEADERS }
    );
    if (res.ok) {
      const tracks = await res.json();
      if (tracks && tracks.length > 0) {
        allTracks = tracks;
        enrichTrackGenres(allTracks);
        buildGenreFilters();
        render();
        loadMissingThumbnails();
        return;
      }
    }
  } catch (e) { console.warn("Erro ao carregar ranking da semana:", e); }
  list.innerHTML = '<div class="empty">Nenhum dado para esta semana.</div>';
}

async function loadRanking() {
  const list = document.getElementById("track-list");
  const artistGenresPromise = loadArtistGenres();

  try {
    await Promise.all([loadGenres(), loadTrackOverrides(), loadWeeks()]);
    if (allWeeks.length > 0) {
      const latestWeekId = allWeeks[0].id;
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/ranking_tracks?week_id=eq.${latestWeekId}&select=*&order=rank`,
        { headers: SB_HEADERS }
      );
      if (res.ok) {
        const tracks = await res.json();
        if (tracks && tracks.length > 0) {
          allTracks = tracks;
          await Promise.allSettled([artistGenresPromise]);
          enrichTrackGenres(allTracks);
          buildGenreFilters();
          render();
          loadMissingThumbnails();
          return;
        }
      }
    }
  } catch (e) { console.warn("Fallback: erro ao carregar ranking do Supabase:", e); }

  try {
    const res = await fetch("data/ranking.json");
    if (!res.ok) throw new Error("Arquivo não encontrado");
    const data = await res.json();
    allTracks = data.tracks || [];
    document.getElementById("week-picker-label").textContent = data.week_label || "";
    await Promise.allSettled([artistGenresPromise]);
    enrichTrackGenres(allTracks);
    buildGenreFilters();
    render();
    loadMissingThumbnails();
  } catch (e) {
    list.innerHTML = `<div class="empty">Não foi possível carregar o ranking.<br><small>${esc(e.message)}</small></div>`;
  }
}

// ── Event listeners ─────────────────────────────────────────────────────────

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentFilter = btn.dataset.filter;
  buildGenreFilters();
  render();
  loadMissingThumbnails();
});

document.getElementById("genre-filters").addEventListener("click", e => {
  const btn = e.target.closest(".genre-btn");
  if (!btn) return;
  const genre = btn.dataset.genre;
  if (genre === "__all__")           currentGenres.clear();
  else if (currentGenres.has(genre)) currentGenres.delete(genre);
  else                               currentGenres.add(genre);
  buildGenreFilters();
  render();
  loadMissingThumbnails();
});

// ── Sync Playlists via Supabase Edge Function → GitHub Actions ─────────────
document.getElementById("btn-sync-playlists").addEventListener("click", async () => {
  const btn = document.getElementById("btn-sync-playlists");
  const label = document.getElementById("sync-label");
  if (btn.disabled) return;

  btn.disabled = true;
  btn.className = "btn-sync-playlists syncing";
  label.textContent = "Sincronizando...";

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/trigger-playlist-sync`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${SB_HEADERS.apikey}`,
      },
    });
    const data = await res.json();

    if (res.ok && data.success) {
      btn.className = "btn-sync-playlists success";
      label.textContent = "Workflow disparado!";
    } else {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
  } catch (e) {
    btn.className = "btn-sync-playlists error";
    label.textContent = "Erro!";
    console.error("Sync error:", e);
  }

  setTimeout(() => {
    btn.className = "btn-sync-playlists";
    label.textContent = "Sync Playlists";
    btn.disabled = false;
  }, 4000);
});

loadRanking();
